# DigitalOcean App Platform spec for Commercial Mortgages Portsmouth
# Next.js 16 SSR via Node runtime
# See https://docs.digitalocean.com/products/app-platform/reference/app-spec/
name: commercialmortgagesportsmouth
region: lon
services:
  - name: web
    github:
      repo: commercialmortgagesbroker/commercialmortgagesportsmouth
      branch: main
      deploy_on_push: true
    source_dir: /
    instance_size_slug: basic-xxs
    instance_count: 1
    http_port: 3000
    health_check:
      http_path: /
      initial_delay_seconds: 30
      period_seconds: 30
    build_command: npm ci && npm run build
    run_command: npm start
    envs:
      - key: NODE_ENV
        value: production
        scope: RUN_TIME
      - key: PORT
        value: "3000"
        scope: RUN_TIME
      - key: RESEND_TO
        value: commercialmortgagesbroker@gmail.com
        scope: RUN_TIME
      - key: SITE_SOURCE
        value: Commercial Mortgages Portsmouth Primary Website
        scope: RUN_TIME
      - key: SITE_TAG
        value: CommercialMortgagesPortsmouth
        scope: RUN_TIME
      - key: RESEND_API_KEY
        value: ""
        scope: RUN_TIME
        type: SECRET
